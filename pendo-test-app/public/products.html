<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Products · Novus Test App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/pendo.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">novus<span>.</span></div>
      <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/products" class="active">Products</a>
        <a href="/settings">Settings</a>
      </nav>
      <div class="sidebar-footer">
        <strong data-user-name>—</strong>
        <span data-user-email>—</span><br />
        <span data-account-name>—</span> · <span data-account-plan>—</span>
        <br /><br />
        <button id="logout-button" class="btn-secondary" style="width:100%; padding:6px 10px; font-size:0.85rem;">
          Sign out
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="page-header">
        <div>
          <h1>Products</h1>
          <p>Catalog of products available to your account.</p>
        </div>
        <div style="display:flex; gap:8px;">
          <select id="filter-category" aria-label="Filter by category" style="width:auto;">
            <option value="all">All categories</option>
            <option value="Analytics">Analytics</option>
            <option value="Reporting">Reporting</option>
            <option value="Forecasting">Forecasting</option>
          </select>
          <button id="add-product-btn">+ New product</button>
        </div>
      </header>

      <div id="product-grid" class="cards"></div>
    </main>
  </div>

  <div id="toast" class="toast">Saved</div>

  <script src="/js/auth.js"></script>
  <script>
    const grid = document.getElementById('product-grid');
    const filter = document.getElementById('filter-category');
    let allProducts = [];

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('visible');
      setTimeout(() => t.classList.remove('visible'), 1800);
    }

    function render(products) {
      grid.innerHTML = '';
      products.forEach((p) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `product-card-${p.id}`;
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:start; gap:8px;">
            <h3>${p.name}</h3>
            <span class="badge ${p.status === 'beta' ? 'beta' : ''}">${p.status}</span>
          </div>
          <div class="meta">${p.category}</div>
          <div class="price">$${p.price}<span style="font-size:0.7rem; color: var(--ink-muted); font-family: 'IBM Plex Sans';">/mo</span></div>
          <div class="actions">
            <button class="btn-secondary" data-action="favorite" data-id="${p.id}">★ Favorite</button>
            <button data-action="subscribe" data-id="${p.id}">Subscribe</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    grid.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      const product = allProducts.find((p) => p.id === id);

      if (action === 'favorite') {
        await fetch(`/api/products/${id}/favorite`, { method: 'POST' });
        if (typeof window.trackPendoEvent === 'function') {
          window.trackPendoEvent('Product Favorited', {
            productId: id,
            productName: product.name,
            category: product.category,
          });
        }
        showToast(`Favorited ${product.name}`);
      } else if (action === 'subscribe') {
        if (typeof window.trackPendoEvent === 'function') {
          window.trackPendoEvent('Product Subscribed', {
            productId: id,
            productName: product.name,
            price: product.price,
          });
        }
        showToast(`Subscribing to ${product.name}…`);
      }
    });

    filter.addEventListener('change', () => {
      const cat = filter.value;
      const filtered = cat === 'all' ? allProducts : allProducts.filter((p) => p.category === cat);
      render(filtered);
      if (typeof window.trackPendoEvent === 'function') {
        window.trackPendoEvent('Product Filter Changed', { category: cat });
      }
    });

    document.getElementById('add-product-btn').addEventListener('click', () => {
      if (typeof window.trackPendoEvent === 'function') {
        window.trackPendoEvent('New Product Clicked');
      }
      showToast('New product wizard would open here');
    });

    fetch('/api/products')
      .then((r) => r.json())
      .then(({ products }) => {
        allProducts = products;
        render(products);
      });
  </script>
</body>
</html>
