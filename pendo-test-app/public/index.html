<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign in · Novus Test App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/styles.css" />
  <!-- Pendo install (loads asynchronously). Anonymous init below. -->
  <script src="/js/pendo.js"></script>
</head>
<body>
  <main class="login-shell">
    <div class="login-card">
      <div class="brand">novus<span>.</span></div>
      <p class="lede">Sign in to your test workspace.</p>

      <div id="login-error" class="error"></div>

      <form id="login-form" autocomplete="off">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required value="ada@example.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required value="password" />
        </div>
        <button type="submit" id="login-submit">Sign in</button>
      </form>

      <div class="hint">
        <strong>Test users (password: <code>password</code>):</strong><br />
        ada@example.com — admin / Acme (enterprise)<br />
        grace@example.com — user / Acme (enterprise)<br />
        alan@example.com — user / Bletchley (starter)
      </div>
    </div>
  </main>

  <script>
    // Anonymous Pendo init for the public login page.
    if (typeof window.initAnonymousPendo === 'function') {
      window.initAnonymousPendo();
    }

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');

      const data = {
        email: form.email.value,
        password: form.password.value,
      };

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (!res.ok) {
          const { error } = await res.json().catch(() => ({}));
          errorEl.textContent = error || 'Login failed';
          errorEl.classList.add('visible');
          return;
        }

        const { visitor, account } = await res.json();
        // Identify on this page so the login event itself is attributed.
        if (typeof window.identifyPendoUser === 'function') {
          window.identifyPendoUser(visitor, account);
        }
        if (typeof window.trackPendoEvent === 'function') {
          window.trackPendoEvent('User Signed In', { role: visitor.role });
        }
        window.location.href = '/dashboard';
      } catch (err) {
        errorEl.textContent = 'Network error: ' + err.message;
        errorEl.classList.add('visible');
      }
    });
  </script>
</body>
</html>
