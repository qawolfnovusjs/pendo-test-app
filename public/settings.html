<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Settings · Novus Test App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/pendo.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">novus<span>.</span></div>
      <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/products">Products</a>
        <a href="/settings" class="active">Settings</a>
      </nav>
      <div class="sidebar-footer">
        <strong data-user-name>—</strong>
        <span data-user-email>—</span><br />
        <span data-account-name>—</span> · <span data-account-plan>—</span>
        <br /><br />
        <button id="logout-button" class="btn-secondary" style="width:100%; padding:6px 10px; font-size:0.85rem;">
          Sign out
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="page-header">
        <div>
          <h1>Settings</h1>
          <p>Update your profile and notification preferences.</p>
        </div>
      </header>

      <section class="section" style="background: var(--surface); padding: 28px; border:1px solid var(--line); border-radius: 6px; max-width: 640px;">
        <h2>Profile</h2>
        <form id="settings-form">
          <div class="field-row">
            <div class="field">
              <label for="display-name">Display name</label>
              <input type="text" id="display-name" name="displayName" value="" />
            </div>
            <div class="field">
              <label for="role-select">Role</label>
              <select id="role-select" name="role">
                <option value="admin">Admin</option>
                <option value="user">User</option>
                <option value="viewer">Viewer</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="3" placeholder="Tell us about yourself"></textarea>
          </div>

          <h3 style="margin-top: 24px;">Notifications</h3>

          <div class="field">
            <label style="display:flex; align-items:center; gap:8px; font-weight: 400;">
              <input type="checkbox" id="notify-email" name="notifyEmail" checked style="width:auto;" />
              Email me weekly summaries
            </label>
          </div>
          <div class="field">
            <label style="display:flex; align-items:center; gap:8px; font-weight: 400;">
              <input type="checkbox" id="notify-product" name="notifyProduct" style="width:auto;" />
              Email me about new products
            </label>
          </div>
          <div class="field">
            <label style="display:flex; align-items:center; gap:8px; font-weight: 400;">
              <input type="checkbox" id="notify-marketing" name="notifyMarketing" style="width:auto;" />
              Send me marketing emails
            </label>
          </div>

          <div style="display:flex; gap:8px; margin-top: 16px;">
            <button type="submit" id="save-settings-btn" style="width:auto;">Save changes</button>
            <button type="button" id="cancel-settings-btn" class="btn-secondary" style="width:auto;">Cancel</button>
          </div>
        </form>
      </section>

      <section class="section" style="background: var(--surface); padding: 28px; border:1px solid var(--line); border-radius: 6px; max-width: 640px; margin-top: 24px;">
        <h2 style="color: var(--warning);">Danger zone</h2>
        <p>Permanently delete your account. This cannot be undone.</p>
        <button id="delete-account-btn" class="btn-danger">Delete account</button>
      </section>
    </main>
  </div>

  <div id="toast" class="toast">Saved</div>

  <script src="/js/auth.js"></script>
  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('visible');
      setTimeout(() => t.classList.remove('visible'), 1800);
    }

    document.getElementById('settings-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = {
        displayName: form.displayName.value,
        role: form.role.value,
        bio: form.bio.value,
        notifyEmail: form.notifyEmail.checked,
        notifyProduct: form.notifyProduct.checked,
        notifyMarketing: form.notifyMarketing.checked,
      };
      await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (typeof window.trackPendoEvent === 'function') {
        window.trackPendoEvent('Settings Saved', data);
      }
      showToast('Settings saved');
    });

    document.getElementById('cancel-settings-btn').addEventListener('click', () => {
      if (typeof window.trackPendoEvent === 'function') {
        window.trackPendoEvent('Settings Cancelled');
      }
      showToast('Changes discarded');
    });

    document.getElementById('delete-account-btn').addEventListener('click', () => {
      if (typeof window.trackPendoEvent === 'function') {
        window.trackPendoEvent('Delete Account Clicked');
      }
      showToast('Account deletion would happen here');
    });
  </script>
</body>
</html>
